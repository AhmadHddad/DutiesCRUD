services:
  postgres:
    image: postgres:16-alpine
    container_name: nexplore-duties-postgres
    environment:
      POSTGRES_DB: duties
      POSTGRES_USER: duties
      POSTGRES_PASSWORD: duties
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duties -d duties"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
